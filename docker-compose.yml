services:
    nginx:
        image: nginx:stable-alpine
        ports:
            - "${NGINX_PORT}:8080"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/vhost.local.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - db
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        volumes:
            - ./:/var/www/html
        ports:
            - "${APP_PORT}:9000"
        working_dir: /var/www/html
        depends_on:
            - db

    db:
        image: mysql
        volumes:
            - marina_web-db:/var/lib/mysql
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}

    adminer:
        depends_on:
            - db
        image: library/adminer:latest
        environment:
            - "PHP_UPLOAD_LIMIT=128M"
        ports:
            - "${ADMINER_PORT}:8080"

    node:
        image: node:24-alpine
        volumes:
            - ./:/var/www/html
        working_dir: /var/www/html
        ports:
            - "5173:5173"

        command: ["npm", "run", "dev"]

volumes:
    marina_web-db: